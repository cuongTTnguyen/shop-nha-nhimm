<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ủng Hộ Phát Triển - Shop Nhà Nhimm</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&family=Be+Vietnam+Pro:wght@400;600&display=swap');

        body {
            font-family: 'Be+Vietnam+Pro', sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden; 
            background: linear-gradient(135deg, #f4f1ea 0%, #e0d9c5 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #floating-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .donate-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 2rem;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(74, 103, 65, 0.2);
            text-align: center;
            max-width: 400px;
            width: 90%;
            border: 2px solid #ffffff;
            position: relative;
            z-index: 10;
            animation: cardEntrance 0.8s ease-out;
        }

        @keyframes cardEntrance {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .qr-image {
            width: 100%;
            max-width: 250px;
            margin: 1.5rem auto;
            border-radius: 12px;
            border: 5px solid #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }

        .qr-image:hover {
            transform: scale(1.05);
        }

        .title-text {
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            color: #4a6741;
            font-size: 1.4rem;
            margin-bottom: 0.5rem;
        }

        .bank-info {
            background: #fdfaf3;
            padding: 1rem;
            border-radius: 16px;
            margin-top: 1rem;
            border: 1px dashed #4a6741;
        }

        .copy-btn {
            background: #4a6741;
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 5px;
        }

        .copy-btn:hover { background: #ff4757; }

        .floating-item {
            position: absolute;
            font-size: 1.5rem;
            opacity: 0.6;
            animation: float linear infinite;
        }

        @keyframes float {
            0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        .back-link {
            position: absolute;
            top: 20px;
            left: 20px;
            text-decoration: none;
            color: #4a6741;
            font-weight: bold;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 5px;
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-link">
        <i class="fas fa-arrow-left"></i> Quay lại trang chủ
    </a>

    <div id="floating-container"></div>

    <div class="donate-card">
        <h1 class="title-text">Ủng hộ lúa để mình phát triển ;3</h1>
        <p class="text-gray-600 text-sm italic">Sự đóng góp của bạn giúp khu rừng Woodland Việt Nam ngày càng lớn mạnh!</p>

        <!-- QR CODE: Bạn hãy thay link QR của bạn vào đây -->
        <!-- Ví dụ link VietQR: https://img.vietqr.io/image/<BANK_ID>-<ACCOUNT_NO>-compact.jpg -->
        <img src="https://img.vietqr.io/image/MB-0375772302-compact.jpg?addInfo=Ung%20ho%20RootVN&accountName=NGUYEN%20CUONG" 
             alt="Mã QR Ngân hàng" 
             class="qr-image">

        <div class="bank-info">
            <p class="text-xs uppercase font-bold text-gray-400 mb-1">Thông tin chuyển khoản</p>
            <p class="font-bold text-lg text-gray-800">MB Bank</p>
            <p class="text-gray-700 my-1">STK: <span id="stk-value">0375772302</span></p>
            <p class="font-semibold text-gray-800">NGUYEN MANH CUONG</p>
            
            <button class="copy-btn" onclick="copySTK()">
                <i class="far fa-copy"></i> Sao chép STK
            </button>
        </div>

        <p class="mt-4 text-xs text-gray-400">Cảm ơn bạn rất nhiều! ❤️</p>
    </div>

    <script>
        // Hàm sao chép số tài khoản
        function copySTK() {
            const stk = document.getElementById('stk-value').innerText;
            const el = document.createElement('textarea');
            el.value = stk;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            
            const btn = event.currentTarget;
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-check"></i> Đã chép!';
            setTimeout(() => {
                btn.innerHTML = originalText;
            }, 2000);
        }

        // Tạo hiệu ứng bay bay
        function createFloatingItems() {
            const container = document.getElementById('floating-container');
            const items = ['🍃', '🍂', '🌰', '💰', '✨', '🍀'];
            const itemCount = 30;

            for (let i = 0; i < itemCount; i++) {
                const item = document.createElement('div');
                item.className = 'floating-item';
                item.innerText = items[Math.floor(Math.random() * items.length)];
                
                // Vị trí ngẫu nhiên
                item.style.left = Math.random() * 100 + 'vw';
                
                // Thời gian bay và delay ngẫu nhiên
                const duration = 5 + Math.random() * 10;
                const delay = Math.random() * 10;
                
                item.style.animationDuration = duration + 's';
                item.style.animationDelay = '-' + delay + 's';
                
                // Kích thước ngẫu nhiên
                item.style.fontSize = (1 + Math.random() * 1.5) + 'rem';
                
                container.appendChild(item);
            }
        }

        window.onload = createFloatingItems;
    </script>
</body>
</html>
